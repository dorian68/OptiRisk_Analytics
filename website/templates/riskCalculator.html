{% extends "./index.html" %}

{% block riskCalculator %}

{% load static %}

{% load i18n %}

<!-- templates/services.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
    {% load bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <section>    
    </head>
        <!-- LOADING FORM -->
<body>
    <div class="container"  style="height: 80vh;margin-top: 50px;">
        <h1>Chargez un fichier CSV pour le traitement</h1>
        <form method="post" enctype="multipart/form-data" id="upload-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary" onclick="showLoading()">Charger le fichier</button>
        </form>
        
        <div id="loading" style="display: none;">
            <p>Chargement en cours...</p>
            <div class="spinner-border" role="status"></div>
        </div>
        
        <script>
        function showLoading() {
            document.getElementById("upload-form").style.display = "none";
            document.getElementById("loading").style.display = "block";
        }
        </script>

    </div>
        <!-- END LOADING FORM -->

        <!-- REPORT -->
       </section>
</body>
</html>

{% endblock %}
